<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Blueprint Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="500" rx="16" fill="url(#grid)" />

  <!-- Header Section -->
  <g transform="translate(40, 45)">
    <!-- Security Shield Icon -->
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <text x="40" y="14" font-family="'Inter', sans-serif" font-size="16" font-weight="800" fill="#f8fafc" letter-spacing="1.5">APPLICATION SECURITY</text>
    <text x="40" y="30" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.5">AUTHENTICATION, ENCRYPTION &amp; THREAT SHIELD</text>
  </g>

  <!-- ── Cyber Shield & Lock Centerpiece ── -->
  <g transform="translate(400, 260)">
    <!-- Hexagonal Security Shield Outer Boundary -->
    <polygon points="0,-150 120,-80 120,60 0,130 -120,60 -120,-80" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="10 5" filter="url(#glow-blue)" />
    <!-- Secondary inner shield boundary -->
    <polygon points="0,-130 100,-70 100,50 0,110 -100,50 -100,-70" fill="rgba(59, 130, 246, 0.03)" stroke="rgba(59, 130, 246, 0.15)" stroke-width="1.5" />

    <!-- Padlock Graphic -->
    <g transform="translate(-45, -55)">
      <!-- Padlock Shackle -->
      <path d="M20,30 V10 A25,25 0 0,1 70,10 V30" fill="none" stroke="#10b981" stroke-width="6.5" stroke-linecap="round" filter="url(#glow-green)" />
      <!-- Padlock Body -->
      <rect x="0" y="30" width="90" height="75" rx="12" fill="#0f172a" stroke="#10b981" stroke-width="5" filter="url(#glow-green)" />
      <!-- Keyhole -->
      <circle cx="45" cy="62" r="7" fill="#10b981" />
      <polygon points="41,62 49,62 47,82 43,82" fill="#10b981" />
    </g>

    <!-- Pulse radar lines -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="rgba(16, 185, 129, 0.05)" stroke-width="1" />
    <circle cx="0" cy="0" r="220" fill="none" stroke="rgba(16, 185, 129, 0.03)" stroke-width="1" />
  </g>

  <!-- ── Threat Protection Flow (Left Side) ── -->
  <g transform="translate(80, 150)">
    <!-- Attack Threat Node -->
    <g transform="translate(0, 40)">
      <line x1="0" y1="0" x2="160" y2="40" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4" />
      <!-- Arrowhead -->
      <polygon points="152,35 160,40 150,45" fill="#ef4444" />
      <!-- Blocked Indicator -->
      <circle cx="160" cy="40" r="12" fill="#0f172a" stroke="#ef4444" stroke-width="2" filter="url(#glow-red)" />
      <text x="160" y="44" font-family="'Inter', sans-serif" font-size="12" font-weight="900" fill="#ef4444" text-anchor="middle">✕</text>
      <!-- Source Label -->
      <rect x="-10" y="-12" width="110" height="20" rx="4" fill="#7f1d1d" stroke="#b91c1c" stroke-width="1"/>
      <text x="45" y="1" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#fca5a5" text-anchor="middle">SQL INJECTION</text>
    </g>

    <!-- Secure SSL Connection Node -->
    <g transform="translate(0, 140)">
      <line x1="0" y1="0" x2="195" y2="-20" stroke="#10b981" stroke-width="2" />
      <circle cx="195" cy="-20" r="12" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow-green)" />
      <text x="195" y="-16" font-family="'Inter', sans-serif" font-size="12" font-weight="900" fill="#10b981" text-anchor="middle">✓</text>
      <!-- Source Label -->
      <rect x="-10" y="-12" width="110" height="20" rx="4" fill="#064e3b" stroke="#047857" stroke-width="1"/>
      <text x="45" y="1" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#a7f3d0" text-anchor="middle">HTTPS / TLS 1.3</text>
    </g>
    
    <text x="0" y="230" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#94a3b8">PROTECTIVE WAF DEPLOYED</text>
  </g>

  <!-- ── JWT Token Anatomy Box (Right Side) ── -->
  <g transform="translate(530, 140)">
    <rect width="230" height="150" rx="8" fill="#0b0f19" stroke="#1e293b" stroke-width="1.5" />
    <text x="15" y="24" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#818cf8" letter-spacing="1">JWT AUTH TOKEN</text>
    <line x1="15" y1="34" x2="215" y2="34" stroke="#1e293b" stroke-width="1.5" />

    <!-- JWT Parts Code -->
    <g font-family="'Courier New', Courier, monospace" font-size="9.5" font-weight="700" transform="translate(15, 55)">
      <!-- Header -->
      <text x="0" y="0" fill="#ef4444">eyJhbGciOiJIUzI1NiJ9</text>
      <text x="135" y="0" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#64748b">// header</text>

      <!-- Dot -->
      <text x="0" y="15" fill="#94a3b8">.</text>

      <!-- Payload -->
      <text x="0" y="30" fill="#a855f7">eyJzdWIiOiIxMjM0NTY3OCJ9</text>
      <text x="160" y="30" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#64748b">// payload</text>

      <!-- Dot -->
      <text x="0" y="45" fill="#94a3b8">.</text>

      <!-- Signature -->
      <text x="0" y="60" fill="#0ea5e9">SflKxwRJSMeKKF2QT4fwp</text>
      <text x="145" y="60" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#64748b">// signature</text>
    </g>

    <!-- Secure Signature indicator -->
    <rect x="15" y="125" width="200" height="16" rx="3" fill="#1e1b4b" />
    <text x="22" y="137" font-family="'Inter', sans-serif" font-size="8.5" font-weight="700" fill="#818cf8">✓ DIGITAL SIGNATURE VERIFIED</text>
  </g>

  <!-- Security Audit Logs (Bottom Left) -->
  <g transform="translate(40, 420)">
    <rect width="280" height="40" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
    <text x="12" y="16" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#10b981" letter-spacing="0.5">VAULT KEY MANAGEMENT</text>
    <text x="12" y="30" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">AES-256 Encryption at rest enabled</text>
  </g>
</svg>
