<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Component Gradient -->
    <linearGradient id="compGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Blueprint Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="500" rx="16" fill="url(#grid)" />

  <!-- Header Section -->
  <g transform="translate(40, 45)">
    <!-- System Design Icon -->
    <path d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" />
    <path d="M10 7h4M7 10v4m7 3h-4m3-7v4" stroke="#a855f7" stroke-width="2" />
    <text x="40" y="14" font-family="'Inter', sans-serif" font-size="16" font-weight="800" fill="#f8fafc" letter-spacing="1.5">SYSTEM DESIGN ARCHITECTURE</text>
    <text x="40" y="30" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.5">HIGH-AVAILABILITY &amp; SCALABILITY DISTRIBUTED SYSTEM</text>
  </g>

  <!-- ── Flow Arrows and Connection Lines ── -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Client to Load Balancer -->
    <path d="M120,200 L200,240" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4" />
    <path d="M120,300 L200,260" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4" />

    <!-- Load Balancer to API Gateway -->
    <path d="M280,250 L320,250" fill="none" stroke="#3b82f6" stroke-width="2" />
    <polygon points="314,246 320,250 314,254" fill="#3b82f6" />

    <!-- API Gateway to Microservices -->
    <path d="M410,230 L450,170" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="444,171 450,170 447,176" fill="#3b82f6" />
    <path d="M410,250 L450,250" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="444,247 450,250 444,253" fill="#3b82f6" />
    <path d="M410,270 L450,330" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="447,324 450,330 444,329" fill="#3b82f6" />

    <!-- Microservices to Cache / Databases -->
    <!-- Service A to Cache -->
    <path d="M570,160 L650,135" fill="none" stroke="#10b981" stroke-width="1.5" />
    <polygon points="644,132 650,135 643,138" fill="#10b981" />

    <!-- Service B to Primary DB -->
    <path d="M570,250 L640,250" fill="none" stroke="#10b981" stroke-width="2" />
    <polygon points="634,247 640,250 634,253" fill="#10b981" />

    <!-- Service C to Kafka (Async broker) -->
    <path d="M570,340 L650,355" fill="none" stroke="#8b5cf6" stroke-width="1.5" />
    <polygon points="643,352 650,355 644,358" fill="#8b5cf6" />

    <!-- Primary DB to Replica DB (Replication) -->
    <path d="M680,290 L680,330" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5 3" filter="url(#glow-green)" />
    <polygon points="677,324 680,330 683,324" fill="#10b981" />
  </g>

  <!-- ── Nodes & Components ── -->

  <!-- Clients (Far Left) -->
  <g transform="translate(60, 160)">
    <!-- Desktop -->
    <rect width="60" height="40" rx="4" fill="url(#compGrad)" stroke="#1e293b" stroke-width="1.5" />
    <polygon points="20,40 40,40 35,48 25,48" fill="#1e293b" />
    <text x="30" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">WEB APP</text>
  </g>
  <g transform="translate(60, 280)">
    <!-- Phone -->
    <rect width="40" height="60" rx="6" fill="url(#compGrad)" stroke="#1e293b" stroke-width="1.5" transform="translate(10,0)" />
    <circle cx="30" cy="52" r="3" fill="#1e293b" />
    <text x="30" y="32" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#94a3b8" text-anchor="middle">MOBILE</text>
  </g>

  <!-- Load Balancer (Nginx) -->
  <g transform="translate(200, 210)">
    <rect width="80" height="80" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow-blue)" />
    <text x="40" y="36" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#f8fafc" text-anchor="middle">LOAD</text>
    <text x="40" y="52" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#f8fafc" text-anchor="middle">BALANCER</text>
    <text x="40" y="66" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#3b82f6" text-anchor="middle">NGINX</text>
  </g>

  <!-- API Gateway -->
  <g transform="translate(320, 210)">
    <rect width="90" height="80" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow-blue)" />
    <text x="45" y="36" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#f8fafc" text-anchor="middle">API</text>
    <text x="45" y="52" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#f8fafc" text-anchor="middle">GATEWAY</text>
    <text x="45" y="66" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#3b82f6" text-anchor="middle">ROUTING &amp; AUTH</text>
  </g>

  <!-- Microservices (Center-Right) -->
  <!-- Service A (User Service) -->
  <g transform="translate(450, 130)">
    <rect width="120" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" />
    <text x="12" y="24" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#f1f5f9">USER SERVICE</text>
    <text x="12" y="38" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Port: 8081 / java</text>
    <circle cx="108" cy="12" r="4" fill="#10b981" />
  </g>
  <!-- Service B (Order Service) -->
  <g transform="translate(450, 225)">
    <rect width="120" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" />
    <text x="12" y="24" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#f1f5f9">ORDER SERVICE</text>
    <text x="12" y="38" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Port: 8082 / java</text>
    <circle cx="108" cy="12" r="4" fill="#10b981" />
  </g>
  <!-- Service C (Payment Service) -->
  <g transform="translate(450, 310)">
    <rect width="120" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" />
    <text x="12" y="24" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#f1f5f9">PAYMENT SERV.</text>
    <text x="12" y="38" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Port: 8083 / node</text>
    <circle cx="108" cy="12" r="4" fill="#10b981" />
  </g>

  <!-- Redis Cache (Top Right Cylinder) -->
  <g transform="translate(640, 100)">
    <path d="M10,10 C10,5 70,5 70,10 L70,40 C70,45 10,45 10,40 Z" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow-green)" />
    <ellipse cx="40" cy="10" rx="30" ry="5" fill="#0f172a" stroke="#10b981" stroke-width="2" />
    <text x="40" y="30" font-family="'Inter', sans-serif" font-size="9.5" font-weight="800" fill="#10b981" text-anchor="middle">REDIS</text>
    <text x="40" y="58" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">CACHE LAYER</text>
  </g>

  <!-- Database Cluster (cylinder cluster) -->
  <!-- Primary Database -->
  <g transform="translate(640, 220)">
    <path d="M10,10 C10,5 70,5 70,10 L70,40 C70,45 10,45 10,40 Z" fill="#0f172a" stroke="#10b981" stroke-width="2" />
    <ellipse cx="40" cy="10" rx="30" ry="5" fill="#0f172a" stroke="#10b981" stroke-width="2" />
    <text x="40" y="30" font-family="'Inter', sans-serif" font-size="9.5" font-weight="800" fill="#f8fafc" text-anchor="middle">PRIMARY</text>
  </g>
  <!-- Replica Database -->
  <g transform="translate(640, 320)">
    <path d="M10,10 C10,5 70,5 70,10 L70,40 C70,45 10,45 10,40 Z" fill="#0f172a" stroke="#64748b" stroke-width="2" />
    <ellipse cx="40" cy="10" rx="30" ry="5" fill="#0f172a" stroke="#64748b" stroke-width="2" />
    <text x="40" y="30" font-family="'Inter', sans-serif" font-size="9.5" font-weight="800" fill="#94a3b8" text-anchor="middle">REPLICA</text>
    <!-- Label -->
    <text x="40" y="56" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#64748b" text-anchor="middle">READ-ONLY</text>
    <text x="-40" y="-30" font-family="'Inter', sans-serif" font-size="8.5" font-weight="800" fill="#10b981" text-anchor="middle">REPLICATION</text>
  </g>

  <!-- Message Broker (Bottom Center) -->
  <g transform="translate(420, 420)">
    <rect width="180" height="40" rx="5" fill="#0b0f19" stroke="#8b5cf6" stroke-width="2" filter="url(#glow-purple)" />
    <!-- Message boxes inside queue -->
    <rect x="15" y="12" width="20" height="16" rx="2" fill="#8b5cf6" />
    <rect x="40" y="12" width="20" height="16" rx="2" fill="#8b5cf6" />
    <rect x="65" y="12" width="20" height="16" rx="2" fill="#8b5cf6" />
    <text x="130" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#fff" text-anchor="middle">KAFKA BROKER</text>
  </g>
</svg>
